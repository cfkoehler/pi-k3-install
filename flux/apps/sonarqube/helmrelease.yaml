apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarqube
  namespace: sonarqube
  labels:
    managed-by: flux
spec:
  interval: 1h
  chart:
    spec:
      chart: sonarqube
      version: "10.x.x"
      sourceRef:
        kind: HelmRepository
        name: sonarqube
        namespace: flux-system
      interval: 12h
  releaseName: sonarqube
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Community Edition (open source)
    edition: community

    # JVM tuning for Raspberry Pi ARM64 constraints
    # Web process handles the UI and API
    jvmOpts: "-Xmx1500m -Xms512m -XX:+HeapDumpOnOutOfMemoryError"
    # CE (Compute Engine) process handles background analysis
    jvmCEOpts: "-Xmx512m -Xms128m -XX:+HeapDumpOnOutOfMemoryError"

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi

    # Persistent storage for SonarQube data (plugins, temp analysis files)
    persistence:
      enabled: true
      storageClass: local-storage
      size: 10Gi

    # Pin to c-w1 where the local PVs are provisioned
    nodeSelector:
      kubernetes.io/hostname: c-w1

    # Traefik ingress for web UI access
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
      hosts:
        - name: sonarqube.homelab.connortech.me
          path: /
          pathType: Prefix

    # Disable bundled Bitnami PostgreSQL subchart — it pins to an old PG11
    # image that has been removed from Docker Hub and has no ARM64 support.
    # Using a standalone postgres:15 deployment instead (see postgres.yaml).
    postgresql:
      enabled: false

    # Point SonarQube at the standalone PostgreSQL service
    jdbcOverwrite:
      enable: true
      jdbcUrl: "jdbc:postgresql://sonarqube-db:5432/sonarqube?socketTimeout=1500"
      jdbcUsername: sonarqube
      jdbcPassword: sonarqube

    # The chart's init-fs script chowns data/temp/logs but omits extensions.
    # Kubernetes creates the subPath directory as root-owned, so uid 1000
    # can't write there. This extra init container fixes the ownership.
    extraInitContainers:
      - name: fix-extensions-perms
        image: busybox:1
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "chown -R 1000:0 /opt/sonarqube/extensions"]
        volumeMounts:
          - name: sonarqube
            mountPath: /opt/sonarqube/extensions
            subPath: extensions

    # Prometheus metrics endpoint
    prometheusMonitoring:
      podMonitor:
        enabled: false
