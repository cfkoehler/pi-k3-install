---

- name: Install storage dependencies
  ansible.builtin.apt:
    name:
      - nfs-common
      - open-iscsi
      - util-linux
      - cryptsetup
      - dmsetup
    state: present

- name: Enable and start iscsid
  ansible.builtin.systemd:
    name: iscsid
    state: started
    enabled: yes
    daemon_reload: yes

- name: Create 30GB Longhorn image file
  command: fallocate -l 30G /var/longhorn.img
  args:
    creates: /var/longhorn.img

- name: Format Longhorn image as ext4
  community.general.filesystem:
    fstype: ext4
    dev: /var/longhorn.img

- name: Create Longhorn mount directory
  ansible.builtin.file:
    path: /var/lib/longhorn
    state: directory
    owner: root
    group: root

- name: Mount Longhorn image via loop device
  ansible.posix.mount:
    path: /var/lib/longhorn
    src: /var/longhorn.img
    fstype: ext4
    opts: loop
    state: mounted
